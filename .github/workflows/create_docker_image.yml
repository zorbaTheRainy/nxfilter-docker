name: NxFilter Create Docker Image CI

on:
  workflow_dispatch:
  schedule:
    - cron:  '34 17 * * 6'   # * is a special character in YAML so you have to quote this string
    # - cron:  '34 17 8-14,22-28 * 6'   # run every 2nd & 4th Saturday (by limiting Saturday to 2 date ranges)

jobs:
  prep:
    runs-on: ubuntu-latest

    outputs:
      NXF_VER: ${{ steps.version.outputs.NXF_VER }}
      BUILD_TIME: ${{ steps.date.outputs.BUILD_TIME }}
      SKIP_BUILD: ${{ steps.check.outputs.tag_exists }}

    steps:
      - name: Get NxFilter version
        id: version
        run: |
          ver=$(curl -s https://nxfilter.org/curver.php)
          echo "NXF_VER=$ver" >> $GITHUB_OUTPUT

      - name: Run date command
        id: date
        run: |
          buildTime=$(date +%Y-%m-%d)
          echo "BUILD_TIME=$buildTime" >> $GITHUB_OUTPUT

      - name: Check if image with tag already exists
        id: check
        run: |
          TAG_EXISTS=$(curl -s -f -u ${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }} https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/nxfilter/tags/${{ steps.version.outputs.NXF_VER }} > /dev/null && echo "yes" || echo "no")
          echo "tag_exists=$TAG_EXISTS" >> $GITHUB_OUTPUT
          if [ "$TAG_EXISTS" = "yes" ]; then
            echo "::notice::Image with tag '${{ steps.version.outputs.NXF_VER }}' already exists, skipping build"
          fi

      - name: Show workflow variables
        run: |
          echo "NxFilter Version: ${{ steps.version.outputs.NXF_VER }}"
          echo "Build Date: ${{ steps.date.outputs.BUILD_TIME }}"
          echo "Skip Build: ${{ steps.check.outputs.tag_exists }}"

  build:
    runs-on: ubuntu-latest
    needs: prep
    if: needs.prep.outputs.SKIP_BUILD != 'yes'
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            base_image: dhi.io/debian-base:trixie-debian13-dev
          - platform: linux/arm64
            base_image: dhi.io/debian-base:trixie-debian13-dev
          - platform: linux/arm/v7
            base_image: ubuntu:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nxfilter:${{ needs.prep.outputs.NXF_VER }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nxfilter:latest
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            VER_NUM=${{ needs.prep.outputs.NXF_VER }}
            BUILD_DATE=${{ needs.prep.outputs.BUILD_TIME }}
