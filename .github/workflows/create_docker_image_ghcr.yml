name: NxFilter Create Docker GHCR Image CI

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prep:
    runs-on: ubuntu-latest

    outputs:
      NXF_VER: ${{ steps.version.outputs.NXF_VER }}
      BUILD_TIME: ${{ steps.date.outputs.BUILD_TIME }}
      SKIP_BUILD: ${{ steps.check.outputs.tag_exists }}

    steps:
      - name: Get NxFilter version
        id: version
        run: |
          ver=$(curl -s https://nxfilter.org/curver.php)
          echo "NXF_VER=$ver" >> $GITHUB_OUTPUT

      - name: Run date command
        id: date
        run: |
          buildTime=$(date +%Y-%m-%d)
          echo "BUILD_TIME=$buildTime" >> $GITHUB_OUTPUT

      - name: Check if image with tag already exists on Docker Hub
        id: check
        run: |
          TAG_EXISTS=$(curl -s -f -u ${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }} \
            https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/nxfilter/tags/${{ steps.version.outputs.NXF_VER }} \
            > /dev/null && echo "yes" || echo "no")
          echo "tag_exists=$TAG_EXISTS" >> $GITHUB_OUTPUT
          if [ "$TAG_EXISTS" = "yes" ]; then
            echo "::notice::Image with tag '${{ steps.version.outputs.NXF_VER }}' already exists on Docker Hub, skipping build"
          fi

      - name: Show workflow variables
        run: |
          echo "NxFilter Version: ${{ steps.version.outputs.NXF_VER }}"
          echo "Build Date: ${{ steps.date.outputs.BUILD_TIME }}"
          echo "Skip Build: ${{ steps.check.outputs.tag_exists }}"

  build_ghcr:
    runs-on: ubuntu-latest
    needs: prep
    if: needs.prep.outputs.SKIP_BUILD != 'yes'

    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch_tag: amd64
            base_image: dhi.io/debian-base:trixie-debian13-dev
          # Uncomment when ready:
          # - platform: linux/arm64
          #   arch_tag: arm64
          #   base_image: dhi.io/debian-base:trixie-debian13-dev
          # - platform: linux/arm/v7
          #   arch_tag: armv7
          #   base_image: ubuntu:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push per-arch images to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/nxfilter:${{ needs.prep.outputs.NXF_VER }}-${{ matrix.arch_tag }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            VER_NUM=${{ needs.prep.outputs.NXF_VER }}
            BUILD_DATE=${{ needs.prep.outputs.BUILD_TIME }}

  merge_ghcr:
    runs-on: ubuntu-latest
    needs: [prep, build_ghcr]
    if: needs.prep.outputs.SKIP_BUILD != 'yes'

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Merge GHCR manifests
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          GHCR_REPO=ghcr.io/$OWNER/nxfilter
          NXF_VER=${{ needs.prep.outputs.NXF_VER }}

          docker buildx imagetools create \
            -t ${GHCR_REPO}:${NXF_VER} \
            ${GHCR_REPO}:${NXF_VER}-amd64

          docker buildx imagetools create \
            -t ${GHCR_REPO}:latest \
            ${GHCR_REPO}:${NXF_VER}-amd64

  copy_to_dockerhub:
    runs-on: ubuntu-latest
    needs: [prep, merge_ghcr]
    if: needs.prep.outputs.SKIP_BUILD != 'yes'

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy multi-arch images from GHCR to Docker Hub
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          GHCR_REPO=ghcr.io/$OWNER/nxfilter
          DH_REPO=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nxfilter
          NXF_VER=${{ needs.prep.outputs.NXF_VER }}

          docker buildx imagetools create \
            -t ${DH_REPO}:${NXF_VER} \
            ${GHCR_REPO}:${NXF_VER}

          docker buildx imagetools create \
            -t ${DH_REPO}:latest \
            ${GHCR_REPO}:${NXF_VER}
