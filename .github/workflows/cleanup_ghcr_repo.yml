name: GHCR Old ImageCleanup

on:
  workflow_dispatch:
  repository_dispatch:
    types: [ghcr_cleanup]

jobs:
  cleanup:
    runs-on: ubuntu-latest

    env:
      OWNER: ${{ github.repository_owner }}

    steps:
      - name: Set Repo name
        id: repo_name
        run: |
          echo "REPO_NAME=nxfilter" >> $GITHUB_OUTPUT

      - name: Normalize GHCR_REPO to lowercase
        run: |
          OWNER_LOWER=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          REPO_LOWER=$(echo "${{ steps.repo_name.outputs.REPO_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "GHCR_REPO=ghcr.io/$OWNER_LOWER/$REPO_LOWER" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all tags from GHCR
        id: tags
        run: |
          TAGS=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://ghcr.io/v2/${GHCR_REPO#ghcr.io/}/tags/list \
            | jq -r '.tags[]?' )

          echo "TAGS<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Delete per-arch tags
        run: |
          # Define patterns you want to delete
          ARCH_PATTERNS=("-amd64" "-arm64" "-armv7" "-armv2")

          # Convert GHCR tag list into a bash array, removing empty lines
          readarray -t TAG_LIST <<< "$(printf "%s\n" "${{ steps.tags.outputs.TAGS }}" | sed '/^$/d')"

          echo "Found ${#TAG_LIST[@]} tags in GHCR"
          echo "Patterns to delete: ${ARCH_PATTERNS[*]}"

          for TAG in "${TAG_LIST[@]}"; do
            MATCHED=false

            for PATTERN in "${ARCH_PATTERNS[@]}"; do
              if [[ "$TAG" == *"$PATTERN" ]]; then
                MATCHED=true
                echo "Deleting tag: $TAG (matched pattern: $PATTERN)"

                # Delete the tag; ignore errors (404, etc.)
                curl -s -X DELETE \
                  -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                  "https://ghcr.io/v2/${GHCR_REPO#ghcr.io/}/manifests/$TAG" \
                  || echo "Warning: failed to delete $TAG (ignored)"

                break
              fi
            done

            if [[ "$MATCHED" == false ]]; then
              echo "Skipping tag: $TAG"
            fi
          done

          echo "Cleanup complete."

      - name: Delete untagged manifests
        run: |
          echo "GHCR automatically garbage-collects untagged manifests."
