name: GHCR Cleanup

on:
  workflow_dispatch:
  repository_dispatch:
    types: [ghcr_cleanup]

jobs:
  cleanup:
    runs-on: ubuntu-latest

    env:
      OWNER: ${{ github.repository_owner }}

    steps:
      - name: Normalize GHCR_REPO to lowercase
        run: |
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          echo "GHCR_REPO=ghcr.io/$OWNER_LC/nxfilter" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all tags from GHCR
        id: tags
        run: |
          TAGS=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://ghcr.io/v2/${GHCR_REPO#ghcr.io/}/tags/list \
            | jq -r '.tags[]')

          echo "TAGS<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Delete per-arch tags
        run: |
          for TAG in ${{ steps.tags.outputs.TAGS }}; do
            if [[ "$TAG" =~ -amd64$ || "$TAG" =~ -arm64$ || "$TAG" =~ -armv7$ ]]; then
              echo "Deleting arch tag: $TAG"
              curl -s -X DELETE \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                "https://ghcr.io/v2/${GHCR_REPO#ghcr.io/}/manifests/$TAG"
            fi
          done

      - name: Delete untagged manifests
        run: |
          echo "GHCR automatically garbage-collects untagged manifests."
